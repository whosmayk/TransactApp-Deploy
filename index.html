<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instalador de TransactApp</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: #333; }
        .btn { display: inline-block; background-color: #0078d4; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; margin-top: 20px; font-weight: bold; }
        .btn:hover { background-color: #005a9e; }
        p { color: #666; }
    </style>
</head>
<body>
    <div class="card">
        <h1>TransactApp</h1>
        <p>Aplicación de gestión de finanzas personales.</p>
        <p>Versión actual: <strong>1.0.0.4</strong></p>
        <a href="setup.exe" class="btn">Descargar Instalador</a>
        <br><br>
        <p><small>Nota: Se requiere Windows para ejecutar esta aplicación.</small></p>
    </div>
</body>
</html>
